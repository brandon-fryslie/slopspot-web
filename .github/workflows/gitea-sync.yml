# [LAW:single-enforcer] The one automatic trigger that propagates a verified GitHub
# master commit to Gitea — making homelab image builds (voter/discoverer/prober)
# fire without a manual 'git push gitea master'. Fires only on push to master, which
# branch protection already gates on CI green + approving review, so only verified
# commits reach Gitea. (slopspot-infra-jaw)
name: Gitea Sync

on:
  push:
    branches: [master]

jobs:
  sync:
    name: Mirror master to Gitea
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up SSH deploy key for Gitea
        run: |
          mkdir -p ~/.ssh
          # [FRAMING:representation] The key is stored base64-encoded (single line) and
          # decoded here — a multi-line OpenSSH private key passed raw through a secret +
          # `echo` mangles into an invalid key (the silent auth failure that froze this
          # sync). base64 carries it as opaque bytes until this one decode.
          echo "${{ secrets.GITEA_DEPLOY_KEY }}" | base64 -d > ~/.ssh/gitea_deploy
          chmod 600 ~/.ssh/gitea_deploy
          # [LAW:one-source-of-truth] Host key pinned from ssh-keyscan at setup time —
          # the one place the Gitea host identity is declared; CI never accepts a TOFU
          # prompt that could be intercepted by a MITM during the run.
          echo "[gitea.sanctuary.gdn]:2222 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAVDnn+Ay3k+U8iykzrJ/oVDeo/fGg+lZCZgsw2dm5B6" >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host gitea.sanctuary.gdn
            HostName gitea.sanctuary.gdn
            Port 2222
            User git
            IdentityFile ~/.ssh/gitea_deploy
            IdentitiesOnly yes
          EOF

      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Push master to Gitea
        run: |
          git remote add gitea ssh://git@gitea.sanctuary.gdn:2222/brandon-fryslie/slopspot-web.git
          # [LAW:one-source-of-truth] GitHub is authoritative; Gitea is a derived mirror.
          # Force so the mirror always reflects GitHub — a non-force push silently REJECTS
          # the moment anything is committed directly to Gitea (which froze this sync for
          # ~10 days). Never commit to the Gitea mirror; this push reasserts GitHub as truth.
          git push --force gitea HEAD:master
