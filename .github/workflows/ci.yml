# [LAW:single-enforcer] The one machine-enforced gate on the SDLC boundary: every PR
# that reaches master must have green lint + typecheck + test. Three separate jobs so
# each appears as a distinct named status check — branch protection (.2) can require
# them individually and each failure is unambiguous in the PR UI.
name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: '10.28.2'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: '10.28.2'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # [LAW:one-source-of-truth] wrangler types reads .dev.vars to project SLOPSPOT_*
      # secret keys into the Env type — without it, tsc -b fails on env.SLOPSPOT_*
      # references that don't exist on Env. Dummy values suffice: only the KEY NAMES
      # need to be present for the type projection; the values are never used by tsc.
      - name: Write dummy .dev.vars for wrangler types Env projection
        run: cp .dev.vars.example .dev.vars
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: '10.28.2'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # [LAW:no-ambient-temporal-coupling] Migrate-on-ship made structural: prod D1 once lagged master by three
  # migrations because applying them was a MANUAL step a human forgot across merged epics (slopspot-deploy-ai5).
  # This job removes the human from the loop — every merge to master applies pending D1 migrations and deploys
  # the worker, in that ONE ORDER, gated on green checks. So "the migration runs when the code that needs it
  # ships" is no longer a checklist item; it is the only path code reaches prod.
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # [LAW:dataflow-not-control-flow] Only a real merge to master deploys — a PR build runs the gates but never
    # ships. The condition is a value on the event, not a separate workflow.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # [LAW:verifiable-goals] Deploy only green code: the same three gates every PR had to clear must be green on
    # the merge commit before a single byte reaches prod.
    needs: [lint, typecheck, test]
    # [LAW:single-enforcer] One prod deploy at a time — two overlapping merges must not race the migration apply
    # or the worker upload. A newer run waits rather than interleaving.
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: '10.28.2'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # [LAW:no-ambient-temporal-coupling] SCHEMA LEADS CODE. Migrations apply BEFORE the worker uploads, so the
      # new worker never meets an old shape, and a failed migration aborts the job before any code ships (the
      # old worker keeps running against the unchanged schema — a safe no-op, never a half-deploy). wrangler's
      # apply auto-proceeds in non-interactive CI (no prompt flag needed).
      - name: Apply pending D1 migrations (remote)
        run: pnpm exec wrangler d1 migrations apply slopspot-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # pnpm RUN deploy — the bare `pnpm deploy` is shadowed by pnpm's monorepo-deploy builtin (a
      # pnpm-workspace.yaml exists). The build step is load-bearing: it emits build/server/wrangler.json that
      # `wrangler deploy` reads, so deploying without a fresh build would ship the previous config.
      - name: Build & deploy worker
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
